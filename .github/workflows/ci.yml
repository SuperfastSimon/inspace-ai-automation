name: CI — Lint & Dry-Run All Agents

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      topic:
        description: 'Genesis Pipeline topic'
        required: false
        default: 'AI automation trends 2026'
      email:
        description: 'Report recipient email'
        required: false
        default: 'martin@saikou.tech'

jobs:
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python syntax — all concepts
        run: |
          for f in concept*/main.py genesis_pipeline/genesis_pipeline.py; do
            echo "Checking $f..."
            python -m py_compile "$f" && echo "  ✓ OK"
          done

  dry-run-genesis:
    name: Genesis Pipeline Dry-Run
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r genesis_pipeline/requirements.txt
      - name: Dry-run Genesis Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          cd genesis_pipeline
          python genesis_pipeline.py \
            --topic "${{ github.event.inputs.topic || 'AI automation trends 2026' }}" \
            --email "${{ github.event.inputs.email || 'martin@saikou.tech' }}" \
            --dry-run

  weekly-genesis:
    name: Weekly Genesis Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r genesis_pipeline/requirements.txt
      - name: Run Genesis Pipeline + Send Email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          cd genesis_pipeline
          python genesis_pipeline.py \
            --topic "AI automation & GEO trends" \
            --email "martin@saikou.tech"
